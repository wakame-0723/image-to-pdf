<!DOCTYPE html>
<html>
<head>
    <title>Image to PDF</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>📄 Image to PDF</h1>

<form action="/convert" method="post" enctype="multipart/form-data">

    <div id="drop-area">
        📂 ここに画像をドラッグ＆ドロップ<br><br>
        またはクリックして選択
    </div>

    <input type="text" id="filename" placeholder="ファイル名を入力（任意）">

    <input type="file" id="fileElem" name="images" multiple accept="image/*" hidden>

    <br><br>

    <button type="submit">PDFに変換</button>

    <!-- 進捗バー -->
    <div id="progress-container" style="display:none; margin-top:20px;">
        <div style="width:80%; margin:auto; background:#ddd; border-radius:5px;">
            <div id="progress-bar" style="width:0%; height:20px; background:#4a90e2; border-radius:5px;"></div>
        </div>
        <p id="progress-text">0%</p>
    </div>

</form>

<script>
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("fileElem");
const form = document.querySelector("form");
const button = form.querySelector("button");

// ダウンロードエリア
const downloadArea = document.createElement("div");
downloadArea.style.marginTop = "20px";
document.body.appendChild(downloadArea);

// ローディング
const loading = document.createElement("div");
loading.innerHTML = "⏳ 処理中...";
loading.style.display = "none";
loading.style.marginTop = "20px";
document.body.appendChild(loading);

// クリック選択
dropArea.addEventListener("click", () => fileInput.click());

// ファイル選択
fileInput.addEventListener("change", () => showPreview(fileInput.files));

// ドラッグ
dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave", () => {
    dropArea.classList.remove("dragover");
});

// ドロップ
dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.classList.remove("dragover");

    const files = e.dataTransfer.files;
    fileInput.files = files;

    showPreview(files);
});

// ✅ サムネイル表示
function showPreview(files) {
    dropArea.innerHTML = `📂 ${files.length}個のファイル<br><br>`;

    for (let file of files) {
        const reader = new FileReader();

        reader.onload = (e) => {
            const div = document.createElement("div");
            div.style.display = "inline-block";
            div.style.margin = "5px";

            const img = document.createElement("img");
            img.src = e.target.result;
            img.style.width = "80px";
            img.style.borderRadius = "5px";

            const name = document.createElement("div");
            name.textContent = file.name;
            name.style.fontSize = "10px";

            div.appendChild(img);
            div.appendChild(name);
            dropArea.appendChild(div);
        };

        reader.readAsDataURL(file);
    }
}

// ✅ 送信処理
form.addEventListener("submit", (e) => {
    e.preventDefault();

    if (fileInput.files.length === 0) {
        alert("画像を選択してください");
        return;
    }

    const formData = new FormData(form);
    const xhr = new XMLHttpRequest();

    const progressContainer = document.getElementById("progress-container");
    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");

    progressContainer.style.display = "block";
    loading.style.display = "block";
    downloadArea.innerHTML = "";

    button.disabled = true;
    button.textContent = "処理中...";

    // ✅ アップロード進捗
    xhr.upload.addEventListener("progress", (e) => {
        if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            progressBar.style.width = percent + "%";
            progressText.innerText = percent + "%（アップロード中）";
        }
    });

    // ✅ 完了処理
    xhr.onload = () => {
        loading.style.display = "none";

        button.disabled = false;
        button.textContent = "PDFに変換";

        if (xhr.status === 200) {
            progressText.innerText = "✅ 完了！";

            const blob = new Blob([xhr.response], { type: "application/pdf" });
            const url = window.URL.createObjectURL(blob);

            const userInput = document.getElementById("filename").value;

            let filename;
            if (userInput.trim() !== "") {
                filename = userInput.trim() + ".pdf";
            } else {
                const first = fileInput.files[0].name;
                const base = first.split(".").slice(0, -1).join(".");
                filename = base + "_merged.pdf";
            }

            // ✅ ダウンロードボタン
            downloadArea.innerHTML = `
                <a href="${url}" download="${filename}"
                   style="
                       display:inline-block;
                       padding:12px 20px;
                       background:#4a90e2;
                       color:white;
                       border-radius:5px;
                       text-decoration:none;
                       font-size:16px;
                   ">
                    📥 PDFをダウンロード
                </a>
            `;
        } else {
            progressText.innerText = "❌ 変換に失敗しました";
        }
    };

    // ✅ 通信エラー処理
    xhr.onerror = () => {
        loading.style.display = "none";
        progressText.innerText = "❌ 通信エラーが発生しました";

        button.disabled = false;
        button.textContent = "PDFに変換";
    };

    // ✅ 送信
    xhr.open("POST", "/convert");
    xhr.responseType = "blob";
    xhr.send(formData);
});
</script>

</body>
</html>
